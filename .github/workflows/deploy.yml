name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Puxar o código do repositório
        uses: actions/checkout@v4

      - name: 2. Fazer Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 3. Contruir a Imagem e Enviar para o Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/dockerized-node-api:latest

      - name: 4. Acessar a AWS e Rodar o Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/dockerized-node-api:latest
            sudo docker stop node-api || true
            sudo docker rm node-api || true
            sudo docker run -d --name node-api -p 3000:3000 -e API_USERNAME=${{ secrets.API_USERNAME }} -e API_PASSWORD=${{ secrets.API_PASSWORD }} -e SECRET_MESSAGE="${{ secrets.SECRET_MESSAGE }}" ${{ secrets.DOCKER_USERNAME }}/dockerized-node-api:latest
